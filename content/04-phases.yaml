title: Modernization Program Phases
description: >
  The legacy technology debt modernization program is structured across 5 phases, each with distinct objectives, deliverables,
  and exit criteria. Phases are not purely sequential — later phases begin while earlier
  ones continue, following a rolling-wave planning approach.

phases:
  - id: phase-disco
    number: 1
    name: Discovery
    objective: Gather current state IT information and Develop target state requirements.
    activities:
      - Gather Current State IT environment details through interviews, workshops and document analysis
      - Conduct code analysis using AI tools
      - Baseline Current State findings 
      - Gather and Baseline To-Be Statement of Requirements (Functional, Non-functional)
      - Baseline constraints, standards & guidelines (IT / domain application specific standards) relevant for To-Be system
    artefacts:
      - Current State Assessment
      - Code Analysis (using ARC)
      - As-is IT System Baseline      
      - Requirements
      - Non functional Requirements
      - Security & Privacy Requirements
      - Business Intelligence Requirements
      - System Context
      - Standards      
      - RAID Log
    deliverables:
      - To-Be System Requirements 
      - User Stories 
    internal_quality_gates:
      - Business Requirements Review (BRR) Results
      - System Requirements Review (SRR) Results
    client_quality_gates:
      - DDA Advisory (recommended)
    AI_SDLC: 
      - IBM Watson ARC 
      - IBM Consulting Advantage (ICA) SDLC Assistant Packs - Business Analysis

  - id: phase-hld
    number: 2
    name: High Level Design 
    objective: Develop High level solution architecture and design prototype
    activities:
      - Develop Solution Architecture 
      - Establish Architecture Decisions (Front End, Back End, Integration, Data, Operational)
      - Develop Component Model (Logical)
        - Identify list of all components and their relationships
        - Specify list of Component interfaces (Logical)
        - Finalize Component realization (implementation) choice      
        - Capture Business Rules for each component (if applicable)
      - Develop user interface design including wireframe prototypes (if applicable)
      - Develop Data Model (Logical)
        - Identify list of logical entities and their relationships
      - Develop Business Intelligence & Analytics Design (if applicable)
      - Develop Operational Model
        - Identify the Logical Locations, Logical Nodes, their relationships
        - Specify Component placement in Nodes 
        - Validate with interaction diagrams for architecturally significant usecases
      - Develop Data Migration Strategy
      - Develop Test Strategy        
    artefacts:
      - Architecture Overview
      - Architecture Decisions  
      - Component Model
      - Business Rules
      - Interface Catalogue 
      - Interface Specification
      - Data Model
      - Data Migration Plan
      - Operational Model
      - Test Strategy
      - Master Test Plan
      - RAID Log
      - RACI Matrix      
    deliverables: 
      - High Level Design
      - Requirements Traceability Verification Matrix      
    internal_quality_gates:
      - Technical Design Authority (TDA) for Architecture Decisions
      - Prelimineray Design Review (PDR) Results
    client_quality_gates:
      - Digital Design Authority (DDA) Review
    AI_SDLC: 
      - IBM Consulting Advantage (ICA) SDLC Assistant Packs - ArchReview

  - id: phase-lld
    number: 3
    name: Low Level Design
    objective: Develop Low Level Design and specifications ready for development
    activities:
      - Update Architecture Decisions
      - Develop Component Model (Physical)
        - Detail Interface Specification with inputs, outputs, error code
        - Capture Logging, Monitoring and Alerting specification 
        - Map Components to relevant Business Rules
      - Detail Business Rules
        - Business Rule Groups with detailed definition of the Rule
        - Detailed Rule definition (Unique Id, Name, Rule Type, specification)
        - Mapping to the Business Process(es) where its applicable
      - Detail wireframe specification 
      - Develop Data Model (Physical)
        - Detailed Specification of DataStores (e.g., Schemas, Tables with field name, length, constraints)
      - Details Business Intelligence & Analytics Design (if applicable)
        - Detailed Design for BI&A (e.g., Data Marts)
        - Detailed Report specification with KPIs, Dashboards
      - Detail Operational Model
        - Physical specification of Nodes along with Deployment Units
        - Full list of Bill of Materials (BoM) - Software, Services and Hardware (if applicable) 
        - Calculate Total Cost of Ownership (TCO)
      - Develop Data Migration Specification
        - Data Profiles (Source, targets)
        - Data Mapping
        - Data transformation process
        - Cutover and Rollback process
      - Develop Test Plans
        - Functional Test Plan
        - Integration Test Plan
        - NFR (Performance, Load) Test Plan
        - Security Test Plan        
    artefacts:
      - Architecture Decisions (updated)
      - Component Model (Physical)
      - Operational Model (Physical)
      - Data Model (Revised)
      - Data Migration Specification
      - Report Specification
      - User Interface Design Specification      
      - Wireframe
      - Test Plan
      - RAID Log (updated)
      - RACI Matrix (updated)

    deliverables:
      - Low Level Design
      - Requirements Traceability Verification Matrix
    internal_quality_gates:
      - Critical Design Review (CDR) Results
    client_quality_gates:
      - Digital Design Authority(DDA) Review
    AI_SDLC: 
      - tbd