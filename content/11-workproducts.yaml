title: Work Products
description: >
  Key deliverables produced across Architecture, Design, Engineering, and Quality Assurance
  disciplines throughout the program lifecycle.

# ── Artifact Registry ────────────────────────────────────────────────────────
# Every unique artifact referenced by any work product is declared here.
# Use artifact_id values in workproduct 'artifacts' (outputs) and 'input_artifacts'.
artifacts:
  # Assessment outputs
  - id: ASIS_NOID
    name: Current State Assessment
  - id: ASIS_NOID2
    name: Code Analysis (using ARC)    
  - id: ASIS_NOID3
    name: As-is IT System Baseline Report    
  # Requirement outputs
  - id: ART 0651
    name: System Context
    desc: The System Context work product initially represents the entire system as a single object or process and identifies the interfaces between the system and external entities.
  - id: ART 0647
    name: Requirements
    desc: This artifact documents the description of features or capabilities, intended behavior, performance etc. required by stakeholders for the agreed solution or service.
    input_artifacts:
      - ASIS_NOID
      - ASIS_NOID2
      - ASIS_NOID3
  - id: OPS 315
    name: Security & Privacy Requirements
    desc: This artifact captures requirements across Administration, Asset Protection, Authorization, Accountability, Availability and Assurance.
  - id: ART 0647-sub
    name: Business Intelligence Requirements
    desc: This artifcat captures Business Intelligence requirements
  - id: ART 0507
    name: Non-functional Requirements
    desc: This artifact captures quality attributes and constraints.
  - id: ART 0650
    name: User Story
    desc: This artifact captures a concise, written description of a piece of intended functionality that has value to a user role of the system under development. This artifact also captures the stakeholders conditions of satisfaction about that piece of functionality.    
    input_artifacts:
      - ART 0647    
      - ART 0647-sub      
  # Architecture outputs
  - id: ARC 310
    name: Standards
    desc: The Standards work product lists and details pre-determined standards for a defined scope of the business and the information technology environment.
  - id: ART 0512
    name: Architecture Overview
    includes:
      - Overall | Application Architecture view
      - Integration Architecture view
      - Data Architecture view
      - Infrastructure Architecture view
    input_artifacts:
      - ART 0651
      - ART 0647
      - ART 0507    
  - id: ART 0513
    name: Architecture Decision Records (ADRs) 
    includes:
      - Problem, Options, Decision, Rationale, Derived Requirement and Implication   
    input_artifacts:
      - ART 0651
      - ART 0647
      - ART 0507
      - ARC 310  
  - id: ART 0515
    name: Component Model
    desc: Describes the functional view of a system, including both the structure and modularity of the software components. Depicts the dynamic behavior of the components and the way in which they interact to accomplish the required functionality. 
    includes: 
      - Identification (WHAT are the list of components)
      - Specification (WHAT are their interfaces, Pre-Post conditions )
      - Realization (HOW to realize this component - Implementation choice)
      - Component Interaction Diagrams (Dynamic view of how components interact)
    input_artifacts: 
      - ART 0647
      - ART 0512 
      - ART 0513      
      - ART 0505     
  - id: ART 0522
    name: Operational Model
    desc: This artifact describes the required operational characteristics and capabilities of the IT solution architecture with prime focus on the non-Functional characteristics.    
    input_artifacts:
      - ART 0512
      - ART 0513
      - ART 0507
      - ART 0651
  - id: ART 0505
    name: Business Rules
    desc: This artifact expresses policies and constraints that apply to the business.    
  - id: ART 0519
    name: Data Model
    desc: This artifact describes logical entities, attributes identifying and describing those entities, and the relationships between them.      
    input_artifacts:
      - ART 0515
  - id: OPS 316
    name: Security Architecture
    desc: A Security Architecture work product documents the structure, capabilities and components of the solution in a manner that is independent of specific vendor products and services.    
    input_artifacts: 
      - OPS 315
  # Design outputs
  - id: APP 148
    name: User Interface Design Specification  
  - id: APP 0730
    name: Wireframes
  - id: APP 030
    name: Interface Specification   
    desc: This artifact describes the interfaces between the various programs that comprise an application as well as between that application and external systems.
  - id: APP 030-sub 
    name: Interface Catalogue
    desc: This work product provides a single Catalogue of all the external and internal interfaces for a solution, covering all component-to-component interactions and providing references or links to the interface definitions.
  - id: CUST DDD 
    name: DevSecOps Design Document
    input_artifacts:
      - ART 0522
      - ART 0515
  - id: APP 017
    name: Data Migration Plan
    desc: The Data Migration Plan work product covers the plan for migrating (automated/manual) data.
    includes: 
      - Migration assumptions
      - Data transfers required
      - Data migration schedule
      - Data migration process
      - Resources and technology required
    input_artifacts:
      - ART 0519
  - id: ART 0521
    name: Data Migration Specification
    desc: This artifact describes data sources to be migrated, and specifies the mapping as well as any required data transformation processes between the source data and the target data.
    includes: 
      - Migration scope
      - Data Profiles (sources, targets, attributes and dependencies)
      - Data mapping
      - Data transformation processes
    input_artifacts: 
      - APP 017
  # Engineering outputs
  - id: art-040
    name: Container Standards Guide
  # Quality Assurance outputs
  - id: art-042
    name: Test Strategy Document
  - id: art-043
    name: Test Environment Matrix
  # Lifecycle outputs
  - id: APP 402
    name: Requirements Traceability Verification Matrix
  # Quality Gate outputs
  - id: ENG 418
    name: Business Requirements Review Results
    desc: The Business Requirements Review (BRR) is conducted to establish the business/customer requirements baseline.
  - id: ENG 424
    name: System Requirements Review Results
    desc: The System Requirements Review (SRR) is conducted to establish the System requirements baseline.
  - id: ENG 419
    name: Critical Design Review (CDR) Results
    desc: The Critical Design Review is held to consolidate component design documentation and review it to develop a design baseline
  - id: ENG 425
    name: Test Readiness Review Results
# ── Work Product Categories ───────────────────────────────────────────────────
categories:
  - id: Discovery
    name: Discovery
    icon: "⬢"
    workproducts:
      - name: System Architecture Blueprint
        phase_id: phase-macro
        description: Target system architecture covering cloud, security, data, and integration layers.
        owner: role-lead-architect
        artifacts:
          - ART 0513
          - ART 0512
      - name: Cloud Landing Zone Design
        phase_id: phase-2
        description: Per-agency cloud environment design for AWS GovCloud and Azure Government with FedRAMP High controls.
        owner: role-cloud-architecture-lead
        input_artifacts:
          - art-001
          - art-002
        artifacts:
          - art-004
          - art-005
          - art-006
      - name: Zero Trust Architecture Design
        phase_id: phase-2
        description: NIST SP 800-207 aligned ZTA design covering identity, device, network, application, and data pillars.
        owner: role-security-architect
        input_artifacts:
          - art-001
          - art-006
        artifacts:
          - art-007
          - art-008
          - art-009
      - name: Integration Architecture
        phase_id: phase-hld
        description: API-first integration platform design replacing 150+ point-to-point integrations.
        owner: role-integration-architect
        input_artifacts:
          - art-002
          - art-003
        artifacts:
          - art-010
          - art-011
          - art-012

      - name: Data Mesh Architecture
        phase_id: phase-4
        description: Federated data mesh design across 5 authoritative data domains with governance and lineage controls.
        owner: role-data-architect
        input_artifacts:
          - art-026
          - art-027
        artifacts:
          - art-013
          - art-014
          - art-015

  - id: design
    name: Architecture
    icon: "◎"
    workproducts:
      - name: High Level Design
        phase_id: phase-hld
        description: Defines future-state Architecture of the to-be system
        owner: role-lead-architect
        artifacts:
          - ART 0512
          - ART 0513
      - name: Digital Portal Design
        phase_id: phase-hld
        description: Human-centered design for the digital portals compliant to WCAG 2.1 AA standards
        owner: role-ux-design-lead
        artifacts:
          - APP 148
          - APP 0730
      - name: Integration Architecture
        phase_id: phase-hld
        description: Integration architecture for external and internal integration 
        owner: role-integration-architect
        artifacts:
          - APP 148
          - APP 0730


  - id: engineering
    name: Engineering
    icon: "⟳"
    workproducts:
      - name: DevSecOps Platform (Operational)
        phase_id: phase-1
        description: Fully operational CI/CD and SecOps platform supporting all ARTs — GitLab, SonarQube, Prisma Cloud, Terraform.
        owner: role-platform-engineering-lead
        input_artifacts:
          - art-023
          - art-024
          - art-025
        artifacts:
          - art-029
          - art-030
          - art-031

      - name: Cloud Migration Playbooks
        phase_id: phase-2
        description: Repeatable migration runbooks for Rehost, Replatform, and Refactor patterns used across 300+ applications.
        owner: role-migration-engineering-lead
        input_artifacts:
          - art-004
          - art-002
        artifacts:
          - art-032
          - art-033
          - art-034
          - art-035

      - name: Enterprise IAM / MFA Implementation
        phase_id: phase-2
        description: Government-wide Identity and Access Management rollout with MFA enforcement for 100% of federal staff.
        owner: role-identity-engineering-lead
        input_artifacts:
          - art-006
          - art-007
        artifacts:
          - art-036
          - art-037
          - art-038

      - name: Microservices Framework
        phase_id: phase-3
        description: Standardised microservices chassis (containers, service mesh, observability) for modernized core business systems.
        owner: role-application-engineering-lead
        input_artifacts:
          - art-010
          - art-012
        artifacts:
          - art-039
          - art-040
          - art-041

  - id: quality-assurance
    name: Quality Assurance
    icon: "◐"
    workproducts:
      - name: Program Test Strategy
        phase_id: phase-1
        description: Enterprise-wide testing strategy covering functional, performance, security, and accessibility testing across all workstreams.
        owner: role-qa-lead
        input_artifacts:
          - art-016
          - art-031
        artifacts:
          - art-042
          - art-043
          - art-044


