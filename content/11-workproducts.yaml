title: Work Products
description: >
  Key deliverables produced across Architecture, Design, Engineering, and Quality Assurance
  disciplines throughout the program lifecycle.

# ── artefact Registry ────────────────────────────────────────────────────────
# Every unique artefact referenced by any work product is declared here.
# Use artefact_id values in workproduct 'artefacts' (outputs) and 'input_artefacts'.
artefacts:
  # Assessment outputs
  - id: ASIS_NOID
    name: Current State Assessment
  - id: ASIS_NOID2
    name: Code Analysis (using ARC)    
  - id: ASIS_NOID3
    name: As-is IT System Baseline    
  # Requirement outputs
  - id: ART 0651
    name: System Context
    desc: The System Context work product initially represents the entire system as a single object or process and identifies the interfaces between the system and external entities.
  - id: ART 0647
    name: Requirements
    desc: This artefact documents the description of features or capabilities, intended behavior, performance etc. required by stakeholders for the agreed solution or service.
    input_artefacts:
      - ASIS_NOID
      - ASIS_NOID2
      - ASIS_NOID3
  - id: OPS 315
    name: Security & Privacy Requirements
    desc: This artefact captures requirements across Administration, Asset Protection, Authorization, Accountability, Availability and Assurance.
  - id: ART 0647-sub
    name: Business Intelligence Requirements
    desc: This artifcat captures Business Intelligence requirements
  - id: ART 0507
    name: Non-functional Requirements
    desc: This artefact captures quality attributes and constraints.
  - id: ART 0650
    name: User Story
    desc: This artefact captures a concise, written description of a piece of intended functionality that has value to a user role of the system under development. This artefact also captures the stakeholders conditions of satisfaction about that piece of functionality.    
    input_artefacts:
      - ART 0647    
      - ART 0647-sub      
  # Architecture outputs
  - id: ARC 310
    name: Standards
    desc: The Standards work product lists and details pre-determined standards for a defined scope of the business and the information technology environment.
  - id: ART 0512
    name: Architecture Overview
    desc: This artifact provides an overview of the main conceptual elements and relationships of an architecture including its major building blocks.
    includes:
      - Overall | Application Architecture view
      - Integration Architecture view
      - Data Architecture view
      - Infrastructure Architecture view
    input_artefacts:
      - ART 0651
      - ART 0647
      - ART 0507    
  - id: ART 0513
    name: Architecture Decisions
    desc: Documents key decisions about the architecture and the rationale behind those decisions.
    includes:
      - Problem, Options, Decision, Rationale, Derived Requirement and Implication   
    input_artefacts:
      - ART 0651
      - ART 0647
      - ART 0507
      - ARC 310  
  - id: ART 0515
    name: Component Model
    desc: Describes the functional view of a system, including both the structure and modularity of the software components. Depicts the dynamic behavior of the components and the way in which they interact to accomplish the required functionality. 
    includes: 
      - Identification (WHAT are the list of components)
      - Specification (WHAT are their interfaces, Pre-Post conditions )
      - Realization (HOW to realize this component - Implementation choice)
      - Component Interaction Diagrams (Dynamic view of how components interact)
    input_artefacts: 
      - ART 0647
      - ART 0512 
      - ART 0513      
      - ART 0505     
  - id: ART 0522
    name: Operational Model
    desc: This artefact describes the required operational characteristics and capabilities of the IT solution architecture with prime focus on the non-Functional characteristics.    
    input_artefacts:
      - ART 0512
      - ART 0513
      - ART 0507
      - ART 0651
  - id: ART 0505
    name: Business Rules
    desc: This artefact expresses policies and constraints that apply to the business.    
  - id: ART 0519
    name: Data Model
    desc: This artefact describes logical entities, attributes identifying and describing those entities, and the relationships between them.      
    input_artefacts:
      - ART 0515
      - APP 027
  - id: APP 027
    name: Report Specification
    desc: Report Specifications describe new reports and enhancements to existing reports to be produced by the application.
  - id: OPS 316
    name: Security Architecture
    desc: A Security Architecture work product documents the structure, capabilities and components of the solution in a manner that is independent of specific vendor products and services.    
    input_artefacts: 
      - OPS 315
  # Design outputs
  - id: APP 148
    name: User Interface Design Specification 
    desc: The primary purpose of the User Interface Design Specification is to communicate detailed guidance to the developers concerning the user interface to be implemented. 
  - id: APP 0730
    name: Wireframes
    desc: The purpose of the wireframes is for a skeletal visual representation of what the end product will look like and is to communicate features a page will contain.
  - id: APP 030
    name: Interface Specification   
    desc: This artefact describes the interfaces between the various programs that comprise an application as well as between that application and external systems.
  - id: APP 030-sub 
    name: Interface Catalogue
    desc: This work product provides a single Catalogue of all the external and internal interfaces for a solution, covering all component-to-component interactions and providing references or links to the interface definitions.
  - id: CUST DDD 
    name: DevSecOps Design Document
    desc: Involves a comprehensive document that outlines the architecture, processes, tools, and security considerations for implementing DevSecOps practices within an organization development lifecycle.
    input_artefacts:
      - ART 0522
      - ART 0515
  - id: APP 017
    name: Data Migration Plan
    desc: The Data Migration Plan work product covers the plan for migrating (automated/manual) data.
    includes: 
      - Migration assumptions
      - Data transfers required
      - Data migration schedule
      - Data migration process
      - Resources and technology required
    input_artefacts:
      - ART 0519
  - id: ART 0521
    name: Data Migration Specification
    desc: This artefact describes data sources to be migrated, and specifies the mapping as well as any required data transformation processes between the source data and the target data.
    includes: 
      - Migration scope
      - Data Profiles (sources, targets, attributes and dependencies)
      - Data mapping
      - Data transformation processes
    input_artefacts: 
      - APP 017
  # Quality Assurance outputs
  - id: ART 0651
    name: Test Strategy
    desc: This artifact defines the goals and objectives fro testing as well as the overall approach for how the test effort will be conducted to achieve those results.
  - id: APP 133
    name: Master Test Plan
    desc: The Master Test Plan documents the "what" (scope and objectives), the "why" (purpose), the "when" (key milestones), and the "who" (organizational roles and responsibilities) for all levels of dynamic testing.
    input_artefacts:
      - ART 0651
  # Lifecycle outputs
  - id: APP 402
    name: Requirements Traceability Verification Matrix
    desc: This document traces the requirements through the project design, development and test.
  - id: NONE
    name: RAID Log
    desc: The Risk Action Issue Decision (RAID) Log is used to capture risks, issues/impediments, actions & key decisions that are generated throughout the project.    
  # Quality Gate outputs
  - id: ENG 418
    name: Business Requirements Review Results
    desc: The Business Requirements Review (BRR) is conducted to establish the business/customer requirements baseline.
  - id: ENG 424
    name: System Requirements Review Results
    desc: The System Requirements Review (SRR) is conducted to establish the System requirements baseline.
  - id: ENG 419
    name: Critical Design Review (CDR) Results
    desc: The Critical Design Review is held to consolidate component design documentation and review it to develop a design baseline
  - id: ENG 425
    name: Test Readiness Review Results       